<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 250" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="530" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#ff5a3c">VisionDrive — ANPR pipeline</text>

  <!-- stages -->
  <g>
    <!-- 1 -->
    <rect x="20"  y="80" width="150" height="86" rx="12" fill="#475569"/>
    <text x="95"  y="116" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Video Source</text>
    <text x="95"  y="138" text-anchor="middle" font-size="11" fill="#e2e8f0">webcam · file</text>
    <text x="95"  y="152" text-anchor="middle" font-size="11" fill="#e2e8f0">HLS / MJPEG / CCTV</text>

    <!-- 2 -->
    <rect x="200" y="80" width="150" height="86" rx="12" fill="#3b82f6"/>
    <text x="275" y="116" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Vehicle Detection</text>
    <text x="275" y="138" text-anchor="middle" font-size="11" fill="#eff6ff">YOLOv5 /</text>
    <text x="275" y="152" text-anchor="middle" font-size="11" fill="#eff6ff">COCO-SSD</text>

    <!-- 3 -->
    <rect x="380" y="80" width="150" height="86" rx="12" fill="#10b981"/>
    <text x="455" y="116" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Track + Speed</text>
    <text x="455" y="138" text-anchor="middle" font-size="11" fill="#ecfdf5">stable IDs</text>
    <text x="455" y="152" text-anchor="middle" font-size="11" fill="#ecfdf5">km/h estimate</text>

    <!-- 4 -->
    <rect x="560" y="80" width="150" height="86" rx="12" fill="#ff5a3c"/>
    <text x="635" y="116" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Plate → OCR</text>
    <text x="635" y="138" text-anchor="middle" font-size="11" fill="#fff1ed">locate plate</text>
    <text x="635" y="152" text-anchor="middle" font-size="11" fill="#fff1ed">Tesseract / EasyOCR</text>

    <!-- 5 -->
    <rect x="740" y="80" width="150" height="86" rx="12" fill="#a855f7"/>
    <text x="815" y="116" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Format + Colour</text>
    <text x="815" y="138" text-anchor="middle" font-size="11" fill="#f5f3ff">O↔0 / I↔1 fix</text>
    <text x="815" y="152" text-anchor="middle" font-size="11" fill="#f5f3ff">HSV colour</text>

    <!-- 6 -->
    <rect x="920" y="80" width="120" height="86" rx="12" fill="#475569"/>
    <text x="980" y="116" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Log + Export</text>
    <text x="980" y="138" text-anchor="middle" font-size="11" fill="#e2e8f0">snapshots</text>
    <text x="980" y="152" text-anchor="middle" font-size="11" fill="#e2e8f0">CSV · HTML</text>
  </g>

  <!-- arrows -->
  <g stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)">
    <line x1="172" y1="123" x2="196" y2="123"/>
    <line x1="352" y1="123" x2="376" y2="123"/>
    <line x1="532" y1="123" x2="556" y2="123"/>
    <line x1="712" y1="123" x2="736" y2="123"/>
    <line x1="892" y1="123" x2="916" y2="123"/>
  </g>

  <text x="530" y="210" text-anchor="middle" font-size="12" fill="#94a3b8">Same pipeline in the React web app (TensorFlow.js) and the Python desktop app (PyTorch).</text>
</svg>
